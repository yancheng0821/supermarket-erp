server:
  port: 8086

spring:
  application:
    name: erp-online
  datasource:
    url: jdbc:mysql://localhost:3306/supermarket_erp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

erp:
  security:
    permit-all-urls:
      - /api/v1/admin/online/**
      - /api/v1/app/online/**
  tenant:
    ignore-tables: []
