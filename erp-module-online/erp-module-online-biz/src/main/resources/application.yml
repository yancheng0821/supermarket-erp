server:
  port: 8086

spring:
  application:
    name: erp-online
  profiles:
    default: local

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

erp:
  security:
    jwt-secret: ${ERP_JWT_SECRET:}
    permit-all-urls:
      - /api/v1/app/online/**
      - /actuator/health
      - /actuator/info
  tenant:
    ignore-tables: []

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  file:
    path: ${ERP_ONLINE_LOG_PATH:./logs/erp-online}
