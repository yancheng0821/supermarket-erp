services:
  erp-system:
    build:
      context: ..
      dockerfile: docker/backend-service.Dockerfile
      args:
        MODULE_PATH: erp-module-system/erp-module-system-biz
    environment:
      SPRING_PROFILES_ACTIVE: ${ERP_RUNTIME_PROFILE:-prod}
      ERP_DB_URL: ${ERP_DB_URL:-jdbc:mysql://mysql:3306/supermarket_erp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      ERP_DB_USERNAME: ${ERP_DB_USERNAME:-root}
      ERP_DB_PASSWORD: ${ERP_DB_PASSWORD:?set ERP_DB_PASSWORD}
      ERP_JWT_SECRET: ${ERP_JWT_SECRET:?set ERP_JWT_SECRET}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      SPRING_DATA_REDIS_HOST: ${ERP_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${ERP_REDIS_PORT:-6379}
      ERP_SYSTEM_LOG_PATH: /var/log/erp-system
    depends_on:
      - mysql
      - redis
      - nacos
    ports:
      - "${SYSTEM_PORT:-8080}:8080"
    restart: unless-stopped
    volumes:
      - ../logs/erp-system:/var/log/erp-system

