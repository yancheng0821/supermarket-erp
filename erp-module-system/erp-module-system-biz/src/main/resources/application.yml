server:
  port: 8080

spring:
  application:
    name: erp-system
  profiles:
    default: local

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

erp:
  security:
    jwt-secret: ${ERP_JWT_SECRET:}
    permit-all-urls:
      - /api/v1/admin/auth/login
      - /api/v1/admin/auth/platform-login
      - /api/v1/admin/auth/tenant-login
      - /actuator/health
      - /actuator/info
  tenant:
    ignore-tables:
      - sys_menu
      - sys_platform_user
      - sys_tenant

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  file:
    path: ${ERP_SYSTEM_LOG_PATH:./logs/erp-system}
